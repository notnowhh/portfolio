<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Jishin A</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface-color: #111111;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #00ffcc; 
            --border: #222222;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .box {
            margin: 100px auto; /* Pushed down a bit more to center it */
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-text {
            color: var(--accent);
            font-family: monospace;
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 15px;
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: inline-block;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    

    <div class="box">
        <h1>Projects</h1>
        
        <div class="status-text">
            > System Status: Under Development_
        </div>

        <p>I am currently building out this section to showcase my work.<br>Check back soon </p>
    </div>

</body>
</html>
